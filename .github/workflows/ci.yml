name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with test extras
        run: python -m pip install -e ".[test]"

      # The suite drives a live VM and skips itself when none is reachable
      # (always the case in CI). A real config isn't committed, so point the
      # tests at the example config; the session probe then skips cleanly.
      - name: Provide config for the test suite
        run: cp vmconfig.example.json vmconfig.json

      - name: Run tests
        run: python -m pytest tests/ -v

  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Smoke-test the wheel
        run: |
          python -m pip install dist/*.whl
          vm --help
          vm-init --help

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    # Only publish on version tags (v0.1.0, v1.2.3, ...).
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/vm-automation-cli
    permissions:
      # Required for PyPI trusted publishing (OIDC) — no API token needed.
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      # STUB: before this job can succeed you must, once, on pypi.org:
      #   1. Create the project (or reserve the name) "vm-automation-cli".
      #   2. Add a Trusted Publisher: this repo, workflow "ci.yml",
      #      environment "pypi" (Manage project -> Publishing).
      #   3. (Optional) Create a "pypi" environment in the GitHub repo settings
      #      with required reviewers to gate releases manually.
      # Then delete the guard step below and tag a release: git tag v0.1.0 && git push --tags
      - name: Publishing not yet configured
        run: |
          echo "::warning::PyPI trusted publishing is not configured yet; skipping upload."
          echo "See the comments in .github/workflows/ci.yml (publish job) for setup steps."

      # Uncomment once trusted publishing is set up on pypi.org:
      # - name: Publish to PyPI
      #   uses: pypa/gh-action-pypi-publish@release/v1
